<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Respiratorio — Felipe Gil</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap');
  :root {
    --bg: #161f2c;
    --surface: #1e2a3a;
    --card: #243245;
    --border: #2e4060;
    --accent: #e05252;
    --blue: #4a9eca;
    --green: #4caf7d;
    --gold: #e8b84b;
    --teal: #45b8ac;
    --text: #dde6f0;
    --muted: #8ba0b8;
    --soft: #b8c8dc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  
  header { background: linear-gradient(160deg, #1a2840 0%, #0f1924 100%); border-bottom: 2px solid rgba(224,82,82,0.35); padding: 20px 18px 16px; text-align: center; }
  header h1 { font-family: 'Oswald', sans-serif; font-size: clamp(1.2rem,5vw,1.8rem); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
  .header-badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .hbadge { font-size: 0.68rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .hb-teal { background: rgba(69,184,172,0.15); border: 1px solid rgba(69,184,172,0.35); color: #90ddd5; }
  .hb-blue { background: rgba(74,158,202,0.15); border: 1px solid rgba(74,158,202,0.35); color: #a8d4f0; }

  .tab-bar { display: flex; background: #111922; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .tab { flex: 1; padding: 13px 8px; font-family: 'Oswald', sans-serif; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; text-align: center; transition: all 0.18s; }
  .tab.active { color: #fff; border-bottom-color: var(--accent); }

  .panel { display: none; padding: 18px 14px 48px; max-width: 680px; margin: 0 auto; }
  .panel.active { display: block; }

  .sec-hdr { border-left: 3px solid var(--accent); padding: 8px 12px; font-family: 'Oswald', sans-serif; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--soft); margin: 20px 0 12px; background: rgba(255,255,255,0.02); border-radius: 0 4px 4px 0; }
  .sec-hdr.teal { border-left-color: var(--teal); }
  .sec-hdr.blue { border-left-color: var(--blue); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; overflow: hidden; }
  .chart-title { font-family: 'Oswald', sans-serif; font-size: 0.82rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
  @media (max-width: 400px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px 10px; text-align: center; }
  .stat-val { font-family: 'Oswald', sans-serif; font-size: 1.6rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .prog-wrap { background: rgba(255,255,255,0.06); border-radius: 8px; height: 8px; overflow: hidden; margin: 6px 0 2px; }
  .prog-bar { height: 100%; border-radius: 8px; transition: width 0.5s ease; }

  .loading { text-align: center; padding: 28px; color: var(--muted); font-size: 0.88rem; }
  .btn { font-family: 'Oswald', sans-serif; font-size: 0.88rem; letter-spacing: 1px; text-transform: uppercase; padding: 12px 22px; border-radius: 8px; border: none; cursor: pointer; }
  .btn-primary { background: var(--teal); color: #fff; width: 100%; }
  .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--soft); font-size: 0.78rem; padding: 6px 14px; }
</style>
</head>
<body>

<header>
  <h1>Tracker Respiratorio</h1>
  <p>Felipe Gil &nbsp;·&nbsp; Seguimiento de progreso pulmonar</p>
  <div class="header-badges">
    <span class="hbadge hb-teal">🌬️ O2Trainer</span>
    <span class="hbadge hb-blue">💨 Voldyne 4000</span>
  </div>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="showTab('registrar',this)">➕ Registrar</div>
  <div class="tab" onclick="showTab('progreso',this)">📈 Progreso</div>
  <div class="tab" onclick="showTab('historial',this)">📋 Historial</div>
</div>

<!-- REGISTRAR -->
<div id="registrar" class="panel active">
  <div class="sec-hdr teal">💪 O2Trainer</div>
  <div class="card">
    <div class="two-col">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="o2Date">
      </div>
      <div class="form-group">
        <label>Cap (mm)</label>
        <select id="o2Cap">
          <option value="14">14mm — Inicio</option>
          <option value="13">13mm</option>
          <option value="12">12mm</option>
          <option value="11">11mm</option>
          <option value="10">10mm</option>
          <option value="9">9mm</option>
          <option value="8">8mm</option>
          <option value="7">7mm</option>
          <option value="6">6mm</option>
          <option value="5">5mm</option>
          <option value="4">4mm</option>
          <option value="3">3mm</option>
          <option value="2.5">2.5mm</option>
          <option value="2">2mm</option>
          <option value="1.5">1.5mm</option>
          <option value="1">1mm — Máximo</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>Reps completadas</label>
        <input type="number" id="o2Reps" value="30">
      </div>
      <div class="form-group">
        <label>Tiempo total (min:seg)</label>
        <input type="text" id="o2Time" placeholder="9:30">
      </div>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="o2Notes"></textarea>
    </div>
    <div id="statusMsg"></div>
    <button class="btn btn-primary" onclick="saveO2()">💾 Guardar O2Trainer</button>
  </div>

  <div class="sec-hdr blue">🌬️ Voldyne 4000</div>
  <div class="card">
    <div class="two-col">
      <div class="form-group"><label>Fecha</label><input type="date" id="vDate"></div>
      <div class="form-group">
        <label>Sesión</label>
        <select id="vSession">
          <option value="mañana">Mañana</option>
          <option value="noche">Noche</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>Volumen (ml)</label><input type="number" id="vVolume" placeholder="1250"></div>
      <div class="form-group"><label>Segundos sostenidos</label><input type="number" id="vSecs" placeholder="9"></div>
    </div>
    <div class="form-group"><label>Reps</label><input type="number" id="vReps" value="10"></div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="vNotes"></textarea>
    </div>
    <div id="vStatusMsg"></div>
    <button class="btn btn-primary" onclick="saveVoldyne()">💾 Guardar Voldyne</button>
  </div>
</div>

<!-- PROGRESO -->
<div id="progreso" class="panel">
  <div id="progressLoading" class="loading"><span class="spinner"></span>Cargando datos...</div>
  <div id="progressContent" style="display:none">
    <div class="chart-wrap">
      <div class="chart-title">Tiempo por sesión (min) — O2Trainer</div>
      <canvas id="o2Chart" height="160"></canvas>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Volumen máximo (ml) — Voldyne</div>
      <canvas id="vChart" height="160"></canvas>
    </div>
    <div style="text-align:center; margin-top:15px;">
      <button class="btn btn-ghost" onclick="loadProgress()">↻ Actualizar</button>
    </div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="historial" class="panel">
  <div id="histLoading" class="loading"><span class="spinner"></span>Cargando historial...</div>
  <div id="histContent" style="display:none">
    <div class="log-list" id="logList"></div>
  </div>
</div>

<script>
// ==================== FIREBASE ====================
const DB = 'https://guia-salud-fg-default-rtdb.firebaseio.com';

async function fbGet(path) {
  try {
    const r = await fetch(`${DB}/${path}.json`);
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}
async function fbPush(path, data) {
  try {
    const r = await fetch(`${DB}/${path}.json`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
}

// ==================== HELPERS ====================
function today() { return new Date().toISOString().split('T')[0]; }

function showStatus(elId, type, msg) {
  const el = document.getElementById(elId);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

// ==================== CHART.JS ====================
let o2ChartInstance = null;
let vChartInstance = null;

function createOrUpdateChart(canvasId, title, labels, values, color, unit) {
  const ctx = document.getElementById(canvasId);

  if (canvasId === 'o2Chart' && o2ChartInstance) o2ChartInstance.destroy();
  if (canvasId === 'vChart' && vChartInstance) vChartInstance.destroy();

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: title,
        data: values,
        borderColor: color,
        backgroundColor: color + '30',
        borderWidth: 3,
        tension: 0.4,
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.08)' },
          ticks: { color: '#8ba0b8', font: { size: 10 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.08)' },
          ticks: { color: '#8ba0b8', font: { size: 11 }, callback: v => v + unit }
        }
      }
    }
  });

  if (canvasId === 'o2Chart') o2ChartInstance = chart;
  if (canvasId === 'vChart') vChartInstance = chart;
}

// ==================== DRAW CHARTS ====================
function drawO2Chart(sessions) {
  const last20 = sessions.slice(-20);
  const labels = last20.map(s => s.date);
  const values = last20.map(s => Number((s.totalSecs / 60).toFixed(2)));
  createOrUpdateChart('o2Chart', 'Tiempo (min)', labels, values, '#45b8ac', ' min');
}

function drawVChart(sessions) {
  const byDay = {};
  sessions.forEach(s => {
    if (!byDay[s.date] || s.volume > byDay[s.date]) {
      byDay[s.date] = s.volume;
    }
  });

  const sortedDates = Object.keys(byDay).sort((a, b) => a.localeCompare(b));
  const last20 = sortedDates.slice(-20);

  const labels = last20;
  const values = last20.map(d => byDay[d]);

  createOrUpdateChart('vChart', 'Volumen (ml)', labels, values, '#4a9eca', ' ml');
}

// ==================== LOAD PROGRESS ====================
async function loadProgress() {
  const loading = document.getElementById('progressLoading');
  const content = document.getElementById('progressContent');
  
  loading.style.display = 'block';
  content.style.display = 'none';

  const raw = await fbGet('sessions');
  
  const sessions = raw 
    ? Object.values(raw).sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    : [];

  const o2 = sessions.filter(s => s.type === 'o2trainer');
  const vd = sessions.filter(s => s.type === 'voldyne');

  drawO2Chart(o2);
  drawVChart(vd);

  loading.style.display = 'none';
  content.style.display = 'block';
}

// ==================== SAVE FUNCTIONS ====================
async function saveO2() {
  // ... (tu código original de saveO2)
  const date = document.getElementById('o2Date').value;
  const cap = document.getElementById('o2Cap').value;
  const reps = parseInt(document.getElementById('o2Reps').value);
  const timeStr = document.getElementById('o2Time').value;
  const notes = document.getElementById('o2Notes').value;

  if (!date || !cap || !timeStr) return showStatus('statusMsg', 'warn', 'Faltan campos');

  const [m, s] = timeStr.split(':').map(Number);
  const totalSecs = m*60 + s;

  const data = { type: 'o2trainer', date, cap: parseFloat(cap), reps, totalSecs, notes, ts: Date.now() };
  await fbPush('sessions', data);
  showStatus('statusMsg', 'ok', 'Sesión guardada');
}

async function saveVoldyne() {
  // ... (tu código original de saveVoldyne)
  const date = document.getElementById('vDate').value;
  const volume = parseInt(document.getElementById('vVolume').value);
  const secs = parseInt(document.getElementById('vSecs').value);
  const reps = parseInt(document.getElementById('vReps').value);
  const notes = document.getElementById('vNotes').value;

  if (!date || !volume || !secs) return showStatus('vStatusMsg', 'warn', 'Faltan campos');

  const data = { type: 'voldyne', date, volume, secs, reps, notes, ts: Date.now() };
  await fbPush('sessions', data);
  showStatus('vStatusMsg', 'ok', 'Sesión guardada');
}

function showTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  
  if (id === 'progreso') loadProgress();
}

// Init
document.getElementById('o2Date').value = today();
document.getElementById('vDate').value = today();
</script>
</body>
</html>
